<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Антимошенник · переписка</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .no-select, .no-select * {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .bubble-container, .bubble-container * {
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            cursor: text;
        }

        html, body {
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        body {
            background: #eef2f5;
            font-family: 'Inter', 'Space Grotesk', sans-serif;
            color: #1e2a3a;
            display: flex;
            flex-direction: column;
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom) 1rem;
            overflow: hidden;
            height: 100%;
            min-height: 0;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.2rem 0.2rem 0.5rem 0.2rem;
            flex-shrink: 0;
        }
        .score-area {
            display: flex;
            align-items: baseline;
            gap: 0.2rem;
        }
        .score-label {
            font-size: 0.65rem;
            font-weight: 500;
            color: #7f8c8d;
            letter-spacing: 0.3px;
        }
        .score-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2c5f8a;
            line-height: 1;
        }
        .timer-area {
            display: flex;
            align-items: baseline;
            gap: 0.2rem;
        }
        .timer-label {
            font-size: 0.65rem;
            font-weight: 500;
            color: #7f8c8d;
        }
        .timer-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c5f8a;
            font-family: monospace;
        }
        .exit-btn {
            background: #2c5f8a;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            transition: 0.2s;
            font-family: inherit;
        }
        @media (hover: hover) {
            .exit-btn:hover { background: #1e4a6e; }
            .time-btn:hover { background: #2c5f8a; color: white; border-color: #2c5f8a; }
            .start-btn:hover { background: #1e4a6e; }
            .guides-btn:hover { background: #1e8649; }
            .sign-btn:hover { background: #1e4a6e; color: white; border-color: #1e4a6e; }
            .help-link:hover { background: #eef2f8; transform: translateX(5px); }
            .back-to-game-btn:hover { background: #1e4a6e; }
            .submit-btn:hover { background: #1e4a6e; }
        }

        .chat-container {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0.2rem 0 0.5rem 0;
            margin-bottom: 0.2rem;
            -webkit-overflow-scrolling: touch;
        }
        .chat-log {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding-bottom: 0.2rem;
            width: 100%;
            transition: opacity 0.3s ease-out;
        }
        .chat-log.fade-out { opacity: 0; }
        .chat-log.fade-in { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message {
            display: flex;
            width: 100%;
        }
        .message.scammer { justify-content: flex-start; }
        .message.victim { justify-content: flex-end; }

        .bubble-container {
            max-width: 85%;
            transition: transform 0.15s ease;
            cursor: text;
        }
        @media (max-width: 700px) { .bubble-container { max-width: 92%; } }

        .avatar {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 0.5rem;
            cursor: default;
        }
        .scammer .avatar { margin-right: 0.5rem; margin-left: 0; }
        .victim .avatar { margin-left: 0.5rem; margin-right: 0; order: 2; }
        .avatar-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,240,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .avatar-name {
            font-size: 0.55rem;
            font-weight: 500;
            margin-top: 0.15rem;
            color: #7f8c8d;
        }

        .signs-panel {
            flex-shrink: 0;
            padding: 0.3rem 0 0.5rem 0;
            transition: opacity 0.2s;
        }
        .signs-title {
            font-weight: 500;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
            margin-bottom: 0.4rem;
        }
        .signs-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            transition: opacity 0.3s ease-out;
        }
        .signs-grid.fade-out { opacity: 0; }
        .signs-grid.fade-in { animation: fadeIn 0.35s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .sign-btn {
            background: rgba(255, 255, 245, 0.7);
            border: 1px solid #dce5ec;
            border-radius: 40px;
            padding: 0.4rem 0.9rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #3a5a7a;
            transition: 0.2s;
            font-family: inherit;
            backdrop-filter: blur(2px);
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .sign-btn.active {
            background: #2c5f8a;
            color: white;
            border-color: #2c5f8a;
        }

        .submit-btn {
            background: #2c5f8a;
            color: white;
            border: none;
            width: 100%;
            padding: 0.6rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.15s;
            margin: 0.2rem 0 0.15rem 0;
            font-family: inherit;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { background: #b9c2cf; cursor: not-allowed; }
        .feedback {
            text-align: center;
            font-size: 0.6rem;
            color: #7f8c8d;
            padding: 0.2rem 0 0.1rem 0;
            flex-shrink: 0;
        }

        .pause-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            visibility: hidden;
        }
        .pause-overlay.active {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            opacity: 1;
            visibility: visible;
        }
        .pause-stats {
            text-align: center;
            background: transparent;
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pause-overlay.active .pause-stats { transform: scale(1); }
        .pause-points {
            font-size: 3.5rem;
            font-weight: 800;
            color: #e8eef2;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
            letter-spacing: -1px;
            margin-bottom: 0.8rem;
        }
        .pause-counter-big {
            font-size: 3rem;
            font-weight: 700;
            font-family: monospace;
            color: #cbd5e1;
            background: transparent;
            display: inline-block;
            margin: 0.6rem 0;
            letter-spacing: 2px;
        }
        .pause-progress {
            font-size: 1.4rem;
            font-weight: 500;
            color: #cbd5e6;
            margin: 0.4rem 0;
        }
        .pause-progress span { font-size: 2rem; font-weight: 700; color: #e0e7ef; }
        .pause-label {
            font-size: 0.65rem;
            color: #9aaebf;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.6rem;
        }
        .victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2100;
            transition: all 0.3s ease-out;
            opacity: 0;
            visibility: hidden;
        }
        .victory-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .victory-stats {
            background: #f5f7fa;
            border-radius: 1.8rem;
            padding: 1.8rem 2rem;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(200, 210, 220, 0.8);
            color: #2c3e50;
            max-width: 360px;
            width: 90%;
            transform: scale(0.9);
            transition: transform 0.3s ease-out;
        }
        .victory-overlay.active .victory-stats {
            transform: scale(1);
        }
        .victory-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f5ba18;
            margin-bottom: 0.8rem;
        }
        .victory-points {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c5f8a;
            background: #eef2f8;
            padding: 0.4rem 1rem;
            border-radius: 60px;
            display: inline-block;
            margin: 0.5rem 0;
        }
        .certificate-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid #cbd5e1;
            border-radius: 2rem;
            background: white;
            color: #1e2a3a;
            text-align: center;
            margin: 0.8rem 0;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }
        .certificate-input:focus {
            border-color: #2c5f8a;
            box-shadow: 0 0 0 2px rgba(44, 95, 138, 0.2);
        }
        .certificate-input::placeholder {
            color: #94a3b8;
        }
        .certificate-btn {
            background: #2c5f8a;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.2s;
            margin: 0.5rem 0;
            font-family: inherit;
        }
        .certificate-btn:active {
            transform: scale(0.97);
        }
        .cert-hint {
            font-size: 0.65rem;
            color: #7f8c8d;
            margin-top: 0.3rem;
        }
        .victory-close-btn {
            background: #2c5f8a;
            border: 1px solid white;
            color: white;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            margin-top: 0.8rem;
            font-size: 0.85rem;
            transition: 0.2s;
            width: 100%;
            font-family: inherit;
        }
        .victory-close-btn:active {
            transform: scale(0.96);
        }
        .victory-close-btn:active { transform: scale(0.96); }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(100, 100, 110, 0);
            backdrop-filter: blur(0px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1100;
            transition: all 0.3s ease-out;
            opacity: 0;
            visibility: hidden;
        }
        .modal-overlay.active {
            background: rgba(100, 100, 110, 0.6);
            backdrop-filter: blur(8px);
            opacity: 1;
            visibility: visible;
        }
        .modal {
            background: #f5f7fa;
            border-radius: 1.8rem;
            padding: 1.3rem;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.15);
            border: 1px solid rgba(200, 210, 220, 0.8);
            color: #2c3e50;
            max-width: 360px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease-out;
        }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal h2 {
            font-size: 1.3rem;
            margin-bottom: 0.6rem;
            font-weight: 700;
            color: #2c5f8a;
        }
        .rules {
            font-size: 0.75rem;
            background: #eef2f8;
            padding: 0.7rem;
            border-radius: 1rem;
            margin: 0.6rem 0;
            line-height: 1.4;
            text-align: left;
            color: #3a5a7a;
        }
        .age-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.6rem;
            margin: 0.8rem 0;
            padding: 0.4rem 0.6rem;
            border-radius: 3rem;
        }
        .age-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #2c5f8a;
            white-space: nowrap;
        }
        .carousel {
            width: 100px;
            height: 55px;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            background: white;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
        }
        .carousel::-webkit-scrollbar { display: none; }
        .age-item {
            height: 27px;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            color: #aaa;
            background: white;
            transition: all 0.1s ease;
            pointer-events: none;
        }
        .age-item.selected {
            font-size: 22px;
            font-weight: 700;
            color: #2c5f8a;
        }
        .age-item.placeholder {
            color: transparent;
            background: transparent;
            pointer-events: none;
            height: 27px;
        }
        .time-options {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 0.8rem 0;
        }
        .time-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 0.35rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c5f8a;
            transition: 0.2s;
        }
        .time-btn.active-mode {
            background: #2c5f8a;
            color: white;
            border-color: #2c5f8a;
        }
        .start-btn {
            background: #2c5f8a;
            color: white;
            width: 100%;
            padding: 0.6rem;
            border: none;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            transition: 0.2s;
        }
        .guides-btn {
            background: #27ae60;
            color: white;
            width: 100%;
            padding: 0.6rem;
            border: none;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            transition: 0.2s;
        }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e4ee6;
            backdrop-filter: blur(16px);
            color: #f0fcff;
            padding: 0.35rem 0.9rem;
            border-radius: 60px;
            font-size: 0.7rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #b9c2cf; border-radius: 4px; }
        .help-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0);
            backdrop-filter: blur(0px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: all 0.3s ease-out;
            opacity: 0;
            visibility: hidden;
        }
        .help-modal-overlay.active {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(0px);
            opacity: 1;
            visibility: visible;
        }
        .help-modal {
            background: white;
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 1px solid #e2e8f0;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease-out;
        }
        .help-modal-overlay.active .help-modal { transform: scale(1); }
        .help-modal h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c5f8a;
            margin-bottom: 1rem;
        }
        .help-links {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }
        .help-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            background: #f7f9fc;
            border-radius: 1rem;
            text-decoration: none;
            color: #2c5f8a;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }
        .help-link-emoji { font-size: 1.5rem; }
        .help-link-text { flex: 1; text-align: left; }
        .back-to-game-btn {
            background: #2c5f8a;
            color: white;
            border: none;
            width: 100%;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            margin-top: 0.5rem;
            font-family: inherit;
        }
        .back-to-game-btn:active { transform: scale(0.98); }
    </style>
</head>
<body class="no-select">
<div class="game-container" id="gameContainer">
    <div class="game-header">
        <div class="score-area">
            <span class="score-value" id="totalScoreDisplay">0</span>
            <span class="score-label">очки</span>
        </div>
        <div style="display: flex; gap: 0.6rem; align-items: center;">
            <div class="timer-area">
                <span class="timer-value" id="timerDisplay">0</span>
                <span class="timer-label">таймер</span>
            </div>
            <button id="exitBtn" class="exit-btn">меню</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-log" id="chatLog"></div>
    </div>

    <div class="signs-panel" id="signsPanel">
        <div class="signs-title">признаки обмана</div>
        <div id="signsContainer" class="signs-grid"></div>
    </div>

    <button id="submitBtn" class="submit-btn">ответить</button>
    <div id="feedbackMsg" class="feedback"></div>
</div>
<div id="toast" class="toast-msg"></div>

<script>
    // ==================== КОНСТАНТЫ ДЛЯ СЕРТИФИКАТА ====================
    const EMPTY_CERT_URL = 'https://cantevenexist.github.io/stopscam/templates/cert_empty.png';
    const TEMPLATE_URL = 'https://cantevenexist.github.io/stopscam/templates/cert_name.png';

    async function downloadCertificateWithName(playerName) {
        const name = playerName.trim();
        const isNameEmpty = name === '';
        if (isNameEmpty) {
            try {
                const response = await fetch(EMPTY_CERT_URL);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'certificate_empty.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error('Ошибка загрузки пустого сертификата:', error);
                alert('Не удалось загрузить сертификат. Проверьте соединение.');
            }
            return;
        }
        try {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            const imageLoadPromise = new Promise((resolve, reject) => {
                img.onload = resolve;
                img.onerror = reject;
            });
            img.src = TEMPLATE_URL;
            await imageLoadPromise;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const fontSize = 220;
            ctx.font = `bold ${fontSize}px "Segoe UI", "Arial", "Microsoft YaHei", sans-serif`;
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            const textWidth = ctx.measureText(name).width;
            const x = (canvas.width - textWidth) / 2;
            const y = (canvas.height + fontSize) / 2 + 180;
            ctx.fillText(name, x, y);
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `certificate_${name}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }, 'image/png');
        } catch (error) {
            console.error('Ошибка при создании именного сертификата:', error);

            btn.addEventListener('click', () => {
                if (!gameActive || waitingSubmit || gameFinished || isTransitioning || victoryAchieved) return;
                if (btn.classList.contains('active')) { btn.classList.remove('active'); selectedSignsSet.delete(sign.text); }
                else { btn.classList.add('active'); selectedSignsSet.add(sign.text); }
            });
            signsContainer.appendChild(btn);
        });
    }

    function showPauseScreen(earnedPoints, correctCount, totalCorrect) {
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.className = 'pause-overlay';
            overlay.innerHTML = `<div class="pause-stats"><div class="pause-points">+ ${earnedPoints}</div><div class="pause-progress"><span>${correctCount}</span> / ${totalCorrect}</div><div class="pause-counter-big" id="pauseCounter">5</div><div class="pause-label">следующий диалог</div></div>`;
            document.body.appendChild(overlay);
            setTimeout(() => overlay.classList.add('active'), 10);
            let counter = 5;
            const counterSpan = overlay.querySelector('#pauseCounter');
            const interval = setInterval(() => {
                counter--;
                if (counterSpan) counterSpan.textContent = counter;
                if (counter <= 0) {
                    clearInterval(interval);
                    overlay.classList.remove('active');
                    setTimeout(() => { overlay.remove(); resolve(); }, 500);
                }
            }, 1000);
        });
    }

    async function transitionToNextDialog() {
        isTransitioning = true;
        chatLogEl.classList.add('fade-out');
        signsContainer.classList.add('fade-out');
        await new Promise(resolve => setTimeout(resolve, 300));
        if (currentIndex + 1 < currentSituations.length) currentIndex++;
        else currentIndex = 0;
        loadDialog();
        chatLogEl.classList.remove('fade-out');
        signsContainer.classList.remove('fade-out');
        chatLogEl.classList.add('fade-in');
        signsContainer.classList.add('fade-in');
        setTimeout(() => { chatLogEl.classList.remove('fade-in'); signsContainer.classList.remove('fade-in'); }, 400);
        isTransitioning = false;
    }

    async function processRoundAndPause() {
        const dialog = currentSituations[currentIndex];
        const selected = getSelectedDetails();
        let correctCount = 0, wrongCount = 0;
        for (let s of selected) if (s.type === 'correct') correctCount++; else wrongCount++;
        const totalCorrect = dialog.correctSigns.length;
        const missedCount = totalCorrect - correctCount;
        const earnedPoints = calculatePoints(correctCount, wrongCount, missedCount, totalCorrect);
        totalScore += earnedPoints;
        totalScoreSpan.textContent = totalScore;
        checkVictory();
        if (victoryAchieved) {
            waitingSubmit = false;
            submitBtn.disabled = true;
            feedbackDiv.innerHTML = "ПОБЕДА! Игра завершена.";
            return;
        }
        await showPauseScreen(earnedPoints, correctCount, totalCorrect);
        if (!victoryAchieved) await transitionToNextDialog();
        waitingSubmit = false;
        submitBtn.disabled = false;
        submitBtn.textContent = "ответить";
        signsPanel.style.opacity = '1';
        feedbackDiv.innerHTML = "выберите признаки";
        gameActive = !victoryAchieved && !gameFinished;
    }

    function onSubmit() {
        if (!gameActive || waitingSubmit || gameFinished || victoryAchieved || isTransitioning) {
            if (victoryAchieved) feedbackDiv.innerHTML = "вы уже победили!";
            else if (!gameActive) feedbackDiv.innerHTML = "игра не начата";
            else if (gameFinished) feedbackDiv.innerHTML = "игра окончена";
            return;
        }
        if (!infiniteMode && remainingSeconds <= 0) { feedbackDiv.innerHTML = "время вышло"; gameActive = false; gameFinished = true; submitBtn.disabled = true; return; }
        waitingSubmit = true;
        submitBtn.disabled = true;
        signsPanel.style.opacity = '0.4';
        feedbackDiv.innerHTML = "⏳";
        setTimeout(() => { processRoundAndPause(); }, 80);
    }

    function launchGame(mode, age) {
        currentSituations = getSituationsByAge(age);
        currentIndex = 0;
        totalScore = 0;
        totalScoreSpan.textContent = "0";
        selectedSignsSet.clear();
        waitingSubmit = false;
        gameFinished = false;
        victoryAchieved = false;
        gameActive = true;
        isTransitioning = false;
        stopTimer();
        const totalSituations = currentSituations.length;
        maxPossiblePoints = totalSituations * 100;
        if (mode === '1min') { infiniteMode = false; remainingSeconds = 60; startTimer(60, false); }
        else if (mode === '5min') { infiniteMode = false; remainingSeconds = 300; startTimer(300, false); }
        else { infiniteMode = true; startTimer(0, true); }
        loadDialog();
        submitBtn.disabled = false;
        submitBtn.textContent = "ответить";
        signsPanel.style.opacity = '1';
        const needed = Math.ceil(maxPossiblePoints * 0.75);
        feedbackDiv.innerHTML = `🎯 цель: ${needed} очков (75% от ${maxPossiblePoints}) | диалогов: ${totalSituations}`;
    }

    function exitToMenu() {
        stopTimer();
        gameActive = false;
        gameFinished = false;
        waitingSubmit = false;
        isTransitioning = false;
        victoryAchieved = false;
        if (gameTimer) clearInterval(gameTimer);
        const existingModal = document.querySelector('.modal-overlay');
        if (existingModal) { existingModal.classList.remove('active'); setTimeout(() => { existingModal.remove(); showWelcomeModal(); }, 300); }
        else { showWelcomeModal(); }
    }

    function createAgeSlider(defaultAge = 16) {
        const MIN = 12, MAX = 99;
        const container = document.createElement('div'); container.className = 'carousel';
        const topPlaceholder = document.createElement('div'); topPlaceholder.className = 'age-item placeholder'; topPlaceholder.textContent = '•••'; container.appendChild(topPlaceholder);
        for (let age = MIN; age <= MAX; age++) { const div = document.createElement('div'); div.className = 'age-item'; div.textContent = age; div.setAttribute('data-age', age); container.appendChild(div); }
        const bottomPlaceholder = document.createElement('div'); bottomPlaceholder.className = 'age-item placeholder'; bottomPlaceholder.textContent = '•••'; container.appendChild(bottomPlaceholder);
        let isDragging = false, startY = 0, startScrollTop = 0;
        function getCurrentAge() { const items = container.querySelectorAll('.age-item:not(.placeholder)'); const rect = container.getBoundingClientRect(); const centerY = rect.top + rect.height / 2; let closest = null, minDist = Infinity; items.forEach(item => { const itemRect = item.getBoundingClientRect(); const itemCenter = itemRect.top + itemRect.height / 2; const dist = Math.abs(centerY - itemCenter); if (dist < minDist) { minDist = dist; closest = item; } }); return closest ? parseInt(closest.getAttribute('data-age'), 10) : defaultAge; }
        function updateSelection() { const current = getCurrentAge(); const items = container.querySelectorAll('.age-item'); items.forEach(item => { const age = parseInt(item.getAttribute('data-age'), 10); if (!isNaN(age) && age === current) item.classList.add('selected'); else item.classList.remove('selected'); }); }
        function snapToNearest() { const items = container.querySelectorAll('.age-item:not(.placeholder)'); const rect = container.getBoundingClientRect(); const centerY = rect.top + rect.height / 2; let closest = null, minDist = Infinity; items.forEach(item => { const itemRect = item.getBoundingClientRect(); const itemCenter = itemRect.top + itemRect.height / 2; const dist = Math.abs(centerY - itemCenter); if (dist < minDist) { minDist = dist; closest = item; } }); if (closest) closest.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        function scrollToAge(age) { const items = container.querySelectorAll('.age-item'); for (let item of items) if (parseInt(item.getAttribute('data-age'), 10) === age) { item.scrollIntoView({ block: 'center', behavior: 'auto' }); break; } updateSelection(); }
        container.addEventListener('mousedown', (e) => { e.preventDefault(); isDragging = true; startY = e.clientY; startScrollTop = container.scrollTop; container.style.scrollSnapType = 'none'; container.style.cursor = 'grabbing'; });
        window.addEventListener('mousemove', (e) => { if (!isDragging) return; e.preventDefault(); const delta = e.clientY - startY; let newScrollTop = startScrollTop - delta; newScrollTop = Math.max(0, Math.min(newScrollTop, container.scrollHeight - container.clientHeight)); container.scrollTop = newScrollTop; updateSelection(); });
        window.addEventListener('mouseup', () => { if (!isDragging) return; isDragging = false; container.style.scrollSnapType = 'y mandatory'; container.style.cursor = 'grab'; snapToNearest(); });
        container.addEventListener('scroll', () => updateSelection());
        container.addEventListener('wheel', () => setTimeout(updateSelection, 20));
        container.addEventListener('click', (e) => { let target = e.target; if (target.classList?.contains('age-item') && !target.classList.contains('placeholder')) { const age = parseInt(target.getAttribute('data-age'), 10); if (!isNaN(age)) scrollToAge(age); } });
        container.style.cursor = 'grab'; scrollToAge(defaultAge);
        return { container, getCurrentAge };
    }

    function showWelcomeModal() {
        const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
        overlay.innerHTML = `<div class="modal"><h2>антимошенник</h2><div class="rules"><p>📌 выберите признаки обмана в диалоге</p><p>🎯 максимум за раунд <strong>100 очков</strong></p><p>🏆 победа при 75% от максимума</p><p>❌ ложные признаки снижают счёт</p></div><div class="age-row"><span class="age-label">🎂 Ваш возраст</span><div id="ageSliderContainer"></div></div><div class="time-options"><button data-time="1min" class="time-btn">1 минута</button><button data-time="5min" class="time-btn">5 минут</button><button data-time="infinite" class="time-btn">∞ бесконечно</button></div><button class="start-btn" id="modalStartBtn">начать игру</button><button id="helpBtn" class="guides-btn" style="margin-top: 20px">📋 памятки</button></div>`;
        document.body.appendChild(overlay); setTimeout(() => overlay.classList.add('active'), 10);
        const sliderContainer = overlay.querySelector('#ageSliderContainer'); const { container: slider, getCurrentAge } = createAgeSlider(16); sliderContainer.appendChild(slider);
        let chosenTime = '1min'; const btns = overlay.querySelectorAll('.time-btn'); btns.forEach(btn => { btn.addEventListener('click', () => { btns.forEach(b => b.classList.remove('active-mode')); btn.classList.add('active-mode'); chosenTime = btn.getAttribute('data-time'); }); }); btns[0].classList.add('active-mode');
        overlay.querySelector('#modalStartBtn').addEventListener('click', () => { const age = getCurrentAge(); overlay.classList.remove('active'); setTimeout(() => { overlay.remove(); launchGame(chosenTime, age); }, 300); });
        overlay.querySelector('#helpBtn').addEventListener('click', () => { showHelpModal(); });
    }

    function showHelpModal() { const existingModal = document.querySelector('.help-modal-overlay'); if (existingModal) { existingModal.classList.remove('active'); setTimeout(() => existingModal.remove(), 300); return; } const overlay = document.createElement('div'); overlay.className = 'help-modal-overlay'; overlay.innerHTML = `<div class="help-modal"><h2>📚 полезные памятки</h2>
        <div class="help-links">
            <a href="https://cantevenexist.github.io/stopscam/guides/Как%20защитить%20ребенка%20от%20мошенников.pdf" target="_blank" class="help-link" rel="noopener noreferrer">
                <span class="help-link-emoji">👶</span>
                <div class="help-link-text"><div>Как защитить ребёнка от мошенников</div></div>
            </a>
            <a href="https://cantevenexist.github.io/stopscam/guides/Памятка%20по%20противодействию%20мошенничеству.pdf" target="_blank" class="help-link" rel="noopener noreferrer">
                <span class="help-link-emoji">🛡️</span>
                <div class="help-link-text"><div>Памятка по противодействию мошенничеству</div></div>
            </a>
        </div><button class="back-to-game-btn">← вернуться к игре</button></div>`; document.body.appendChild(overlay); setTimeout(() => overlay.classList.add('active'), 10); const backBtn = overlay.querySelector('.back-to-game-btn'); backBtn.addEventListener('click', () => { overlay.classList.remove('active'); setTimeout(() => overlay.remove(), 300); }); }

    submitBtn.addEventListener('click', onSubmit);
    exitBtn.addEventListener('click', exitToMenu);
    showWelcomeModal();
</script>
</body>
</html>
